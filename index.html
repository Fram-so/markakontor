<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markakontor — Verdens kuleste kontor</title>
    <meta name="description" content="Off-grid, solcelledrevet kontor midt i Maridalen. Leies per dag eller uke — med badstue.">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="stylesheet" href="https://forwardby.io/fonts/gt-alpina/gt-alpina.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .font-alpina-sans { font-family: 'GT Alpina Sans', system-ui, sans-serif; }
        .font-alpina-serif { font-family: 'GT Alpina Serif', Georgia, serif; }
    </style>
</head>
<body class="bg-white text-black font-alpina-sans">
    <div class="min-h-screen flex flex-col">
        <header class="px-6 py-6 lg:px-8">
            <nav class="flex items-center">
                <a href="/">
                    <img src="/assets/logo.png" alt="Markakontor" class="h-8">
                </a>
            </nav>
        </header>

        <main class="flex-1 flex items-center">
            <div class="px-6 lg:px-8 w-full">
                <div class="mx-auto max-w-3xl text-center">
                    <h1 class="text-4xl sm:text-6xl tracking-tight leading-tight">Verdens kuleste <em class="font-alpina-serif italic">kontor</em></h1>
                    <p class="mt-8 text-lg text-gray-500 sm:text-xl leading-relaxed">
                        Off-grid, solcelledrevet, midt i Maridalen. Leies per dag eller uke — med badstue.
                    </p>
                </div>
            </div>
        </main>

        <footer class="border-t border-black px-6 py-8 lg:px-8">
            <div class="mx-auto max-w-7xl text-center text-sm text-gray-500">
                markakontor.no
            </div>
        </footer>
    </div>
</body>
</html>
